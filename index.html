    <style>
        :root {
            --primary: #10B981; /* Emerald Green */
            --primary-hover: #059669;
            --secondary: #3B82F6; /* Blue */
            --bg-dark: #0B0F19;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-main: #FFFFFF;
            --text-muted: #9CA3AF;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(59, 130, 246, 0.15), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(16, 185, 129, 0.15), transparent 25%);
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Glassmorphism Card */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--card-border);
            padding: 40px 30px;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            width: 90%;
            max-width: 420px;
            position: relative;
            z-index: 10;
            transform: translateY(20px);
            opacity: 0;
            animation: slideUpFade 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes slideUpFade {
            to { transform: translateY(0); opacity: 1; }
        }

        /* Trust Badge */
        .trust-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(16, 185, 129, 0.1);
            color: var(--primary);
            padding: 6px 14px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            margin-bottom: 25px;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .event-image {
            width: 100px;
            height: 100px;
            border-radius: 20px;
            object-fit: cover;
            margin-bottom: 20px;
            box-shadow: 0 0 30px rgba(59, 130, 246, 0.3);
            border: 2px solid rgba(255,255,255,0.1);
        }

        .title {
            font-family: 'Outfit', sans-serif;
            font-size: 22px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }

        .subtitle {
            font-family: 'Outfit', sans-serif;
            font-size: 42px;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 15px;
            text-shadow: 0 0 25px rgba(16, 185, 129, 0.4);
        }

        .description {
            color: var(--text-muted);
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        /* Premium Professional Button Animation */
        .claim-button {
            display: block;
            width: 100%;
            background: linear-gradient(135deg, var(--primary), #047857);
            color: #ffffff;
            padding: 16px 0;
            border-radius: 14px;
            text-decoration: none;
            font-family: 'Outfit', sans-serif;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            position: relative;
            border: 1px solid rgba(255,255,255,0.2);
            margin-bottom: 30px;
            /* Soft professional pulse */
            animation: softPulse 2.5s infinite;
        }

        .claim-button:hover {
            transform: translateY(-2px);
            background: linear-gradient(135deg, #34D399, #059669);
        }

        .claim-button:active {
            transform: translateY(1px);
        }

        @keyframes softPulse {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.5); }
            70% { box-shadow: 0 0 0 15px rgba(16, 185, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        /* Modern Countdown */
        .countdown-wrapper {
            background: rgba(0, 0, 0, 0.2);
            padding: 15px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.05);
            margin-bottom: 5px;
        }
        
        .timer-title {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 10px;
            display: block;
        }

        #countdown {
            display: flex;
            justify-content: center;
            gap: 12px;
        }

        .time-box {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .time-val {
            font-family: 'Outfit', sans-serif;
            font-size: 20px;
            font-weight: 700;
            color: #fff;
            background: rgba(255,255,255,0.05);
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.2);
        }

        .time-label {
            font-size: 10px;
            color: var(--text-muted);
            margin-top: 5px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Live Notification Toast System (Centered & Slided from left) */
        .toast-container {
            position: fixed;
            bottom: 20px;
            left: 0;
            width: 100%;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center; /* Centers the toast horizontally */
            gap: 10px;
            pointer-events: none;
        }

        .toast {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(59, 130, 246, 0.3);
            padding: 12px 20px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            transform: translateX(-100vw); /* Starts from far left of the screen */
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .toast.show {
            transform: translateX(0); /* Ends up perfectly in the center */
        }

        .toast-icon {
            color: var(--primary);
            background: rgba(16, 185, 129, 0.1);
            padding: 8px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

            font-size: 14px;
            color: #fff;
            font-family: 'Inter', sans-serif;
        }

        .toast-text span.amount {

            font-weight: 700;

        // 1. Generate Custom Random Prize ($50, $70, $100, $150... up to $5000)
        function getCustomRandomPrize() {
            let possibleAmounts = [50, 70];
            let current = 100;
            while (current <= 5000) {
                possibleAmounts.push(current);
                current += 50;
            }
            return possibleAmounts[Math.floor(Math.random() * possibleAmounts.length)];
        }

        // Get or Set Main User Prize (Saves in Cache)
        function getOrSetMainUserPrize() {
            let savedPrize = localStorage.getItem('user_main_prize');
            if (savedPrize) {
                return parseInt(savedPrize);
            } else {
                let newPrize = getCustomRandomPrize();
                localStorage.setItem('user_main_prize', newPrize);
                return newPrize;
            }
        }

        // Animated Money Counter (Slow -> Fast -> Slow)
        function animateValue(obj, start, end, duration) {
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                
                // Ease-In-Out Cubic equation for "Slow -> Fast -> Slow" effect
                const easeInOut = progress < 0.5 
                    ? 4 * progress * progress * progress 
                    : 1 - Math.pow(-2 * progress + 2, 3) / 2;
                    
                let current = Math.floor(start + (end - start) * easeInOut);
                obj.innerHTML = current.toLocaleString();
                
                if (progress < 1) {
                    window.requestAnimationFrame(step);
                } else {
                    obj.innerHTML = end.toLocaleString();
                }
            };
            window.requestAnimationFrame(step);
        }

        // 2. Smart Countdown (LocalStorage)
        function initTimer() {
            // New key so it resets the timer for everyone based on the new duration
            const timerKey = 'reward_timer_end_9h47m'; 
            let endTime = localStorage.getItem(timerKey);
            
            // Set Exact Duration to: 9 Hours + 47 Minutes + 34 Seconds
            const duration = (9 * 3600 * 1000) + (47 * 60 * 1000) + (34 * 1000); 

            if (!endTime || new Date().getTime() > parseInt(endTime)) {
                endTime = new Date().getTime() + duration;
                localStorage.setItem(timerKey, endTime);
            }

            function updateTimer() {
                let now = new Date().getTime();
                let distance = parseInt(endTime) - now;

                if (distance < 0) {
                    endTime = new Date().getTime() + duration;
                    localStorage.setItem(timerKey, endTime);
                    distance = duration;
                }

                let d = Math.floor(distance / (1000 * 60 * 60 * 24));
                let h = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                let m = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                let s = Math.floor((distance % (1000 * 60)) / 1000);

                document.getElementById('days').innerText = d.toString().padStart(2, '0');
                document.getElementById('hours').innerText = h.toString().padStart(2, '0');
                document.getElementById('minutes').innerText = m.toString().padStart(2, '0');
                document.getElementById('seconds').innerText = s.toString().padStart(2, '0');
            }

            setInterval(updateTimer, 1000);
            updateTimer();
        }

        function shuffleArray(array) {
            let shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        function getNextUniqueUser() {
            let savedQueue = JSON.parse(localStorage.getItem('notification_queue'));
            if (!savedQueue || savedQueue.length === 0) {
                savedQueue = shuffleArray(allUsers);
            }
            const user = savedQueue.pop();
            localStorage.setItem('notification_queue', JSON.stringify(savedQueue));
            return user;
